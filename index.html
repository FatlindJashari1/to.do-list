<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pro To Do List</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      --card: rgba(255, 255, 255, 0.1);
      --card-border: rgba(255, 255, 255, 0.18);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #22c55e;
      --accent-dark: #16a34a;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
    }

    .app {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 2.2rem;
      margin-bottom: 8px;
    }

    .header p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .input-group input {
      flex: 1;
      min-width: 220px;
      padding: 14px 16px;
      border: none;
      outline: none;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      font-size: 1rem;
    }

    .input-group input::placeholder {
      color: #cbd5e1;
    }

    .input-group select {
      min-width: 170px;
      padding: 14px 16px;
      border: none;
      outline: none;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    .input-group select option {
      color: #0f172a;
    }

    .input-group button {
      padding: 14px 18px;
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .input-group button:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-btn,
    .clear-btn {
      border: none;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .filter-btn {
      background: rgba(255, 255, 255, 0.12);
      color: white;
    }

    .filter-btn.active {
      background: white;
      color: #0f172a;
    }

    .clear-btn {
      background: var(--danger);
      color: white;
    }

    .clear-btn:hover {
      opacity: 0.9;
    }

    .stats {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .task-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(255, 255, 255, 0.12);
      padding: 14px 16px;
      border-radius: 16px;
      animation: fadeIn 0.25s ease;
    }

    .task-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }

    .task-left input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .task-text {
      word-break: break-word;
      font-size: 1rem;
    }

    .task-details {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .task-category {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .task-category.faculty {
      background: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
    }

    .task-category.work {
      background: rgba(245, 158, 11, 0.2);
      color: #fcd34d;
    }

    .task-category.personal {
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .task-actions {
      display: flex;
      gap: 8px;
    }

    .task-actions button {
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      color: white;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .delete-btn {
      background: var(--danger);
    }

    .edit-btn {
      background: var(--warning);
      color: #111827;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 20px 0;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .app {
        padding: 20px;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .filters {
        justify-content: center;
      }

      .clear-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>My To Do List</h1>
      <p>Organizo ditën tënde me stil dhe thjeshtësi</p>
    </div>

    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Shkruaj një detyrë të re..." />
      <select id="taskCategory">
        <option value="faculty">Fakulteti</option>
        <option value="work">Puna</option>
        <option value="personal">Personale</option>
      </select>
      <button id="addBtn">+ Shto</button>
    </div>

    <div class="toolbar">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
      <button class="clear-btn" id="clearCompleted">Fshi të kryerat</button>
    </div>

    <div class="stats" id="stats">0 detyra gjithsej</div>

    <ul class="task-list" id="taskList"></ul>
    <div class="empty" id="emptyMessage">Nuk ka ende detyra. Shto një të re.</div>
  </div>

  <script>
    const STORAGE_KEY = "codex-pro-todo-tasks";
    const taskInput = document.getElementById("taskInput");
    const taskCategory = document.getElementById("taskCategory");
    const addBtn = document.getElementById("addBtn");
    const taskList = document.getElementById("taskList");
    const stats = document.getElementById("stats");
    const emptyMessage = document.getElementById("emptyMessage");
    const filterButtons = document.querySelectorAll(".filter-btn");
    const clearCompletedBtn = document.getElementById("clearCompleted");

    let tasks = loadTasks();
    let currentFilter = "all";

    function loadTasks() {
      try {
        const savedTasks = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return Array.isArray(savedTasks) ? savedTasks : [];
      } catch (error) {
        return [];
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function getCategoryLabel(category) {
      if (category === "faculty") return "Fakulteti";
      if (category === "work") return "Puna";
      return "Personale";
    }

    function renderTasks() {
      taskList.innerHTML = "";

      let filteredTasks = tasks.filter(task => {
        if (currentFilter === "active") return !task.completed;
        if (currentFilter === "completed") return task.completed;
        return true;
      });

      filteredTasks.forEach(task => {
        const li = document.createElement("li");
        li.className = `task-item ${task.completed ? "completed" : ""}`;

        const taskLeft = document.createElement("div");
        taskLeft.className = "task-left";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = task.completed;
        checkbox.addEventListener("change", function() {
          toggleTask(task.id);
        });

        const taskText = document.createElement("span");
        taskText.className = "task-text";
        taskText.textContent = task.text;

        const taskDetails = document.createElement("div");
        taskDetails.className = "task-details";

        const taskCategoryBadge = document.createElement("span");
        taskCategoryBadge.className = `task-category ${task.category || "personal"}`;
        taskCategoryBadge.textContent = getCategoryLabel(task.category);

        taskDetails.appendChild(taskText);
        taskDetails.appendChild(taskCategoryBadge);

        taskLeft.appendChild(checkbox);
        taskLeft.appendChild(taskDetails);

        const taskActions = document.createElement("div");
        taskActions.className = "task-actions";

        const editButton = document.createElement("button");
        editButton.className = "edit-btn";
        editButton.textContent = "Edit";
        editButton.addEventListener("click", function() {
          editTask(task.id);
        });

        const deleteButton = document.createElement("button");
        deleteButton.className = "delete-btn";
        deleteButton.textContent = "Fshi";
        deleteButton.addEventListener("click", function() {
          deleteTask(task.id);
        });

        taskActions.appendChild(editButton);
        taskActions.appendChild(deleteButton);
        li.appendChild(taskLeft);
        li.appendChild(taskActions);

        taskList.appendChild(li);
      });

      const completedCount = tasks.filter(task => task.completed).length;
      stats.textContent = `${tasks.length} detyra gjithsej • ${completedCount} të kryera`;

      emptyMessage.style.display = filteredTasks.length === 0 ? "block" : "none";
      saveTasks();
    }

    function addTask() {
      const text = taskInput.value.trim();

      if (text === "") return;

      tasks.unshift({
        id: Date.now(),
        text: text,
        completed: false,
        category: taskCategory.value
      });

      taskInput.value = "";
      taskCategory.value = "faculty";
      renderTasks();
    }

    function toggleTask(id) {
      tasks = tasks.map(task =>
        task.id === id ? { ...task, completed: !task.completed } : task
      );
      renderTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter(task => task.id !== id);
      renderTasks();
    }

    function editTask(id) {
      const task = tasks.find(task => task.id === id);
      const newText = prompt("Ndrysho detyrën:", task.text);

      if (newText !== null && newText.trim() !== "") {
        task.text = newText.trim();
        renderTasks();
      }
    }

    function clearCompleted() {
      tasks = tasks.filter(task => !task.completed);
      renderTasks();
    }

    addBtn.addEventListener("click", addTask);

    taskInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        addTask();
      }
    });

    filterButtons.forEach(button => {
      button.addEventListener("click", function() {
        filterButtons.forEach(btn => btn.classList.remove("active"));
        this.classList.add("active");
        currentFilter = this.dataset.filter;
        renderTasks();
      });
    });

    clearCompletedBtn.addEventListener("click", clearCompleted);

    renderTasks();
  </script>
</body>
</html>
